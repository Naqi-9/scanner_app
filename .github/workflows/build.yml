name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build with Docker
        run: |
          docker run --volume ${{ github.workspace }}:/home/user/hostcwd \
            kivy/buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: document-scanner-apk
          path: bin/*.apk
